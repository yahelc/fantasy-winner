{% extends "base.html" %}
{% block title %} — Week Projection{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-3">
  <h4 class="mb-0">Week Projection</h4>
  <a href="/week?fresh=1" class="btn btn-sm btn-outline-secondary">&#8635; Refresh</a>
</div>
<p class="text-muted small">Projected fantasy points for next week based on MLB schedule.</p>

<div hx-get="/week/data" hx-trigger="load" hx-swap="outerHTML">
  <div class="d-flex justify-content-center p-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</div>
{% endblock %}
