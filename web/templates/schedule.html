{% extends "base.html" %}
{% block title %} — Schedule{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-3">
  <h4 class="mb-0">Schedule</h4>
  <a href="/schedule?fresh=1" class="btn btn-sm btn-outline-secondary">&#8635; Refresh</a>
</div>
<p class="text-muted small">
  Next week's game schedule per player. Starters show projected start dates (rotation-based).
  2-start weeks are possible, not certain (~30% historical precision).
</p>

<div hx-get="/schedule/data" hx-trigger="load" hx-swap="outerHTML">
  <div class="d-flex justify-content-center p-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</div>
{% endblock %}
